<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor Visual — HTML</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
/* ╔══════════════════════════════════════════════════════════════╗
   ║  EDITOR VISUAL — Design System Premium                      ║
   ║  Palette: deep warm-black / gold / Inter + JetBrains Mono   ║
   ╚══════════════════════════════════════════════════════════════╝ */
:root{
  /* Surfaces */
  --bg:        #0a0908;
  --s1:        #0e0d0b;
  --s2:        #121009;
  --s3:        #171512;
  --s4:        #1d1a16;
  --s5:        #232018;
  /* Borders */
  --b1:        #1a1815;
  --b2:        #21201b;
  --b3:        #2c2a23;
  --b4:        #3a3730;
  /* Text */
  --t1:        #e4dcd2;
  --t2:        #9a9085;
  --t3:        #5c5650;
  --t4:        #32302c;
  /* Accent */
  --gold:      #c8a45a;
  --gold-h:    #d8b468;
  --gold-dim:  #7a6438;
  --gold-bg:   rgba(200,164,90,.08);
  --gold-glow: rgba(200,164,90,.20);
  /* Semantic */
  --danger:    #c84848;
  --danger-bg: rgba(200,72,72,.10);
  --success:   #5a9e70;
  /* Radius */
  --r1: 4px;
  --r2: 6px;
  --r3: 9px;
  /* Transitions */
  --tx: .13s ease;
  /* Fonts */
  --ff: 'Inter',system-ui,-apple-system,sans-serif;
  --mono: 'JetBrains Mono','Fira Code',monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--ff);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b4)}
#load-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;background:var(--bg);z-index:100}
.load-card{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:40px 44px 36px;display:flex;flex-direction:column;align-items:center;gap:14px;width:340px;box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);position:relative;overflow:hidden}
.load-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
#load-screen h1{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-bottom:2px}
#load-screen>p,.load-card>p{font-size:12px;color:var(--t3);text-align:center}
.btn-gold{background:var(--gold);color:#0a0908;border:none;padding:10px 22px;border-radius:var(--r2);font-weight:700;font-size:13px;cursor:pointer;font-family:var(--ff);letter-spacing:-.01em;transition:background var(--tx),transform var(--tx),box-shadow var(--tx);box-shadow:0 2px 10px rgba(200,164,90,.25)}
.btn-gold:hover{background:var(--gold-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,164,90,.35)}
.btn-gold:active{transform:translateY(0)}
.btn-gold-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:9px 22px;border-radius:var(--r2);font-weight:600;font-size:13px;cursor:pointer;font-family:var(--ff);transition:border-color var(--tx),background var(--tx),transform var(--tx)}
.btn-gold-outline:hover{border-color:var(--gold);background:var(--gold-bg);transform:translateY(-1px)}
.prog-wrap{width:100%;display:none}
.prog-bar{height:3px;background:var(--b2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:0%;transition:width .15s}
.prog-text{font-size:10px;color:var(--t3);text-align:center;letter-spacing:.04em}
.load-privacy{font-size:10px;color:var(--t4);margin-top:6px}
#app{display:none;flex-direction:column;height:100%}
#topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 14px;display:flex;align-items:center;height:46px;gap:8px;flex-shrink:0;position:relative}
#topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--gold) 40%,var(--gold-dim) 70%,transparent 100%);opacity:.7}
.site-name{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:-.01em;white-space:nowrap;padding:4px 10px;background:var(--gold-bg);border:1px solid rgba(200,164,90,.18);border-radius:var(--r1);margin-right:4px;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.mode-tabs{display:flex;gap:2px;background:var(--s3);border:1px solid var(--b1);border-radius:var(--r2);padding:3px}
.mode-tab{background:transparent;border:none;color:var(--t3);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--ff);letter-spacing:.01em;white-space:nowrap;transition:color var(--tx),background var(--tx)}
.mode-tab:hover{color:var(--t1);background:var(--s4)}
.mode-tab.active{background:var(--gold);color:#0a0908;font-weight:700}
.tb-spacer{flex:1}
#status-msg{font-size:11px;color:var(--gold);min-width:80px;text-align:right;font-weight:500;letter-spacing:.01em;opacity:.9}
.tb-btn{background:transparent;border:1px solid var(--b3);color:var(--t2);padding:5px 13px;border-radius:var(--r1);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--ff);transition:border-color var(--tx),color var(--tx),background var(--tx);white-space:nowrap}
.tb-btn:hover{border-color:var(--b4);color:var(--t1);background:var(--s3)}
.tb-btn.gold{background:var(--gold);border-color:var(--gold);color:#0a0908;box-shadow:0 2px 8px rgba(200,164,90,.2)}
.tb-btn.gold:hover{background:var(--gold-h);box-shadow:0 2px 12px rgba(200,164,90,.35)}
.mode-pane{flex:1;overflow:hidden;display:none;flex-direction:column}
.mode-pane.active{display:flex}
#edit-frame{flex:1;border:none;background:#000;min-width:0;display:block;contain:strict}
.props-panel{width:260px;background:var(--s2);border-left:1px solid var(--b1);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
</style>
</head>
<body>
<div id="app-marker" data-status="uploading-incrementally-4"></div>
</body>
</html>
